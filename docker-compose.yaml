services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atoms
      POSTGRES_PASSWORD: atoms
      POSTGRES_DB: atoms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atoms -d atoms"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: on-failure

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/config.yaml
      POSTGRES_URL: postgres://atoms:atoms@postgres:5432/atoms?sslmode=disable
      MONGODB_URI: mongodb://mongodb:27017
      REDIS_ADDR: redis:6379
      REDIS_RATE_LIMIT: "0"
      KAFKA_BROKERS: kafka:9092
    volumes:
      - ./backend/config.yaml:/app/config.yaml

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000

volumes:
  postgres_data: {}
  mongo_data: {}
