# Secret template. For empty/placeholder values you can apply this file as-is.
# To load secrets from .env, generate a YAML from your .env file:
#   make k8s-secret-from-env
#   kubectl apply -f k8s/secret-api-keys.generated.yaml
# (secret-api-keys.generated.yaml is in .gitignore.)
---
apiVersion: v1
kind: Secret
metadata:
  name: atoms-demo-secrets
  namespace: atoms-demo
type: Opaque
stringData:
  OPENAI_API_KEY: ""
  OPENAI_MODEL: "gpt-5.1"
  # Injected at frontend Docker build (e.g. empty for same-origin or http://backend:8080 for SSR)
  NEXT_PUBLIC_API_URL: ""
