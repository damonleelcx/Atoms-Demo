apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: atoms-demo
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args:
            - redis-server
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: atoms-demo
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
