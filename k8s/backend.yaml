apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: atoms-demo
data:
  config.yaml: |
    server:
      port: 8080
    postgres:
      url: "postgres://atoms:atoms@postgres:5432/atoms?sslmode=disable"
    mongodb:
      uri: "mongodb://mongodb:27017"
      database: atoms
    redis:
      addr: "redis:6379"
      rate_limit: 0
      rate_window_sec: 60
    kafka:
      brokers:
        - "kafka:9092"
      topic_requirement: "requirement-stage"
      topic_design: "design-stage"
      topic_implementation: "implementation-stage"
      topic_feedback: "feedback-stage"
      consumer_group: "atoms-agents"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: atoms-demo
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
              until nc -z mongodb 27017; do echo waiting for mongodb; sleep 2; done
              until nc -z redis 6379; do echo waiting for redis; sleep 2; done
              until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done
              echo all deps ready
      containers:
        - name: backend
          image: atoms-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            - name: CONFIG_PATH
              value: "/app/config.yaml"
          envFrom:
            - secretRef:
                name: atoms-demo-secrets
                optional: true
      volumes:
        - name: config
          configMap:
            name: backend-config
---
# Backend has no Ingress; it is reached via the shared Ingress in frontend.yaml at path /api.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: atoms-demo
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
