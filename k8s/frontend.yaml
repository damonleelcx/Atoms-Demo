# Frontend only. Backend has its own Ingress (backend-ingress.yaml) at api.your-domain.com.
# Build frontend with NEXT_PUBLIC_API_URL=http://api.your-domain.com (see README).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: atoms-demo
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: atoms-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: atoms-demo-secrets
                optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: atoms-demo
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
# Ingress for frontend only. Backend is at api.your-domain.com (see backend-ingress.yaml).
# Add your-domain.com and api.your-domain.com to hosts (same IP) when using tunnel or port-forward.
# proxy-buffering off so /api/.../responses/stream (SSE) is streamed through when API goes via frontend.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: atoms-demo
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ec2-18-118-6-21.us-east-2.compute.amazonaws.com
  rules:
    - host: ec2-18-118-6-21.us-east-2.compute.amazonaws.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
# Rewrite broken path /$NEXT_PUBLIC_API_URL/... → /... using rewrite-target (no snippet).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-rewrite-ingress
  namespace: atoms-demo
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: "$2"
spec:
  ingressClassName: nginx
  rules:
    - host: ec2-18-118-6-21.us-east-2.compute.amazonaws.com
      http:
        paths:
          # Match literal $ or %24, then capture rest (e.g. /api/questions) as $2
          - path: "/(\\$NEXT_PUBLIC_API_URL|%24NEXT_PUBLIC_API_URL)(/.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - http:
        paths:
          - path: "/(\\$NEXT_PUBLIC_API_URL|%24NEXT_PUBLIC_API_URL)(/.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 3000
