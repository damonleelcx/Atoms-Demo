apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: atoms-demo
type: Opaque
stringData:
  POSTGRES_USER: atoms
  POSTGRES_PASSWORD: atoms
  POSTGRES_DB: atoms
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: atoms-demo
data:
  POSTGRES_USER: atoms
  POSTGRES_DB: atoms
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: atoms-demo
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: atoms-demo
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
